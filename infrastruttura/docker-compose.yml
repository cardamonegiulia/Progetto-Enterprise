version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: travel_db
    environment:
      POSTGRES_DB: "travel_db"
      POSTGRES_USER: "admin"
      POSTGRES_PASSWORD: "admin_password"
    ports:
      - "5432:5432"
    networks:
      - travel-network

  keycloak:
    image: quay.io/keycloak/keycloak:23.0.0
    container_name: travel_keycloak
    command: start-dev
    environment:
      KC_DB: "postgres"
      KC_DB_URL: "jdbc:postgresql://postgres:5432/travel_db"
      KC_DB_USERNAME: "admin"
      KC_DB_PASSWORD: "admin_password"
      KEYCLOAK_ADMIN: "admin"
      KEYCLOAK_ADMIN_PASSWORD: "admin"
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      - travel-network

networks:
  travel-network:
    driver: bridge